<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Emotion-based Music Player</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; background:#0f1724; color:#e6eef8; display:flex; gap:20px;
           align-items:flex-start; padding:24px; height:100vh; box-sizing:border-box; }
    #left { width:640px; }
    video { width:100%; border-radius:8px; background:#000; }
    canvas { position:absolute; left:0; top:0; }
    #controls { margin-top:12px; display:flex; gap:8px; align-items:center; }
    button, select { padding:8px 12px; border-radius:6px; border: none; background:#1f2937; color:#e6eef8; cursor:pointer; }
    #right { flex:1; min-width:280px; background:#071026; padding:16px; border-radius:8px; height:fit-content; }
    .stat { margin-bottom:12px; }
    .big { font-size:20px; font-weight:700; }
    .small { color:#9fb0c9; font-size:13px; }
    ul { padding-left:18px; }
  </style>
</head>
<body>
  <div id="left">
    <div style="position:relative;">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay" width="640" height="480" style="pointer-events:none;"></canvas>
    </div>
    <div id="controls">
      <button id="startBtn">Start Detection</button>
      <button id="stopBtn" disabled>Stop</button>
      <label style="display:flex;align-items:center;gap:6px;">
        Volume
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.6" />
      </label>
      <label style="display:flex;align-items:center;gap:6px;">
        Sensitivity
        <select id="sensitivity">
          <option value="0.2">Quick</option>
          <option value="0.4" selected>Balanced</option>
          <option value="0.7">Stable</option>
        </select>
      </label>
    </div>
  </div>

  <div id="right">
    <div class="stat">
      <div class="small">Detected Emotion</div>
      <div id="detected" class="big">—</div>
      <div id="confidence" class="small">confidence: —</div>
    </div>

    <div class="stat">
      <div class="small">Now Playing</div>
      <div id="nowPlaying" class="big">—</div>
      <div id="songList" class="small">Playlist mapped to emotions below.</div>
    </div>

    <div style="margin-top:12px;">
      <strong class="small">Emotion → Track mapping</strong>
      <ul id="mapping"></ul>
    </div>
  </div>

  <!-- face-api CDN -->
  <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script>
  // -------------------------
  // Global variables
  // -------------------------
  let detectionRunning = false;   // true when Start clicked
  let detectionInterval = null;
  let lastEmotion = null;
  let smoothingWindow = [];
  const SMOOTH_WINDOW_MAX = 5;

  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const detectedEl = document.getElementById('detected');
  const confidenceEl = document.getElementById('confidence');
  const nowPlayingEl = document.getElementById('nowPlaying');
  const mappingEl = document.getElementById('mapping');
  const volumeEl = document.getElementById('volume');
  const sensitivityEl = document.getElementById('sensitivity');

  // -------------------------
  // Emotion → Song mapping (public URLs)
  // -------------------------
  const EMOTION_TO_SONG = {
    happy: { title: "Happy Vibes", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    sad: { title: "Sad Track", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    neutral: { title: "Neutral Track", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    angry: { title: "Energetic Track", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
    fearful: { title: "Suspense Track", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
    disgusted: { title: "Weird Track", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" },
    surprised: { title: "Surprised Track", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3" }
  };

  // populate mapping list
  for(const [emo, info] of Object.entries(EMOTION_TO_SONG)) {
    const li = document.createElement('li');
    li.textContent = `${emo} → ${info.title}`;
    mappingEl.appendChild(li);
  }

  // -------------------------
  // Audio player
  // -------------------------
  let audio = new Audio();
  audio.loop = false; 
  audio.volume = parseFloat(volumeEl.value);

  volumeEl.addEventListener('input', () => {
    audio.volume = parseFloat(volumeEl.value);
  });

  function startSong(src, title) {
    if (!src) return;
    if (audio.src !== src) {
      audio.pause();
      audio = new Audio(src);
      audio.loop = false; // play once
      audio.volume = parseFloat(volumeEl.value);
      audio.play().catch(() => {
        nowPlayingEl.textContent = title + " (click to play)";
        nowPlayingEl.onclick = () => { audio.play(); nowPlayingEl.onclick = null; };
      });
      nowPlayingEl.textContent = title;
    } else {
      if (audio.paused) audio.play();
      nowPlayingEl.textContent = title;
    }
  }

  function stopSong() {
    if (audio) audio.pause();
    nowPlayingEl.textContent = '—';
  }

  // -------------------------
  // Helpers
  // -------------------------
  function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  // -------------------------
  // Face-api model loading
  // -------------------------
  const modelUrl = './models'; // local folder with models

  async function loadModels() {
    await faceapi.loadTinyFaceDetectorModel(modelUrl);
    await faceapi.loadFaceExpressionModel(modelUrl);
    console.log('face-api models loaded');
  }

  // -------------------------
  // Webcam start/stop
  // -------------------------
  let stream = null;

  async function startWebcam() {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
    video.srcObject = stream;
    await video.play();
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
  }

  function stopWebcam() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    video.pause();
    video.srcObject = null;
  }

  // -------------------------
  // Detection loop
  // -------------------------
  async function detectLoop() {
    if (!video || video.paused || video.ended) return;
    const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 });
    const result = await faceapi.detectSingleFace(video, options).withFaceExpressions();

    ctx.clearRect(0,0,overlay.width, overlay.height);

    if (result && result.detection) {
      const box = result.detection.box;
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#00e676';
      ctx.rect(box.x, box.y, box.width, box.height);
      ctx.stroke();
    }

    if (result && result.expressions) {
      const expr = result.expressions;
      let best = { name: null, value: 0 };
      for(const [name, val] of Object.entries(expr)) {
        if (val > best.value) best = { name, value: val };
      }

      smoothingWindow.push(best.name);
      if (smoothingWindow.length > SMOOTH_WINDOW_MAX) smoothingWindow.shift();

      const counts = {};
      smoothingWindow.forEach(e => counts[e] = (counts[e]||0) + 1);
      let smoothed = null, high = 0;
      for(const k in counts) if (counts[k] > high) { high = counts[k]; smoothed = k; }

      const sensitivity = parseFloat(sensitivityEl.value);
      if (best.value >= sensitivity && smoothed) {
        handleEmotion(smoothed, best.value);
      } else {
        detectedEl.textContent = capitalize(best.name||'—') + (best.value ? ' (weak)' : '');
        confidenceEl.textContent = 'confidence: ' + (best.value ? best.value.toFixed(2) : '—');
      }
    } else {
      detectedEl.textContent = 'No face detected';
      confidenceEl.textContent = '';
    }
  }

  function handleEmotion(emotion, confidence) {
    detectedEl.textContent = capitalize(emotion);
    confidenceEl.textContent = 'confidence: ' + (confidence ? confidence.toFixed(2) : '—');

    if (lastEmotion !== emotion) {
      lastEmotion = emotion;
      const mapping = EMOTION_TO_SONG[emotion] || EMOTION_TO_SONG['neutral'];
      if (mapping) startSong(mapping.src, mapping.title);
    }
  }

  // -------------------------
  // Start/Stop buttons
  // -------------------------
  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    stopBtn.disabled = false;
    detectionRunning = true;

    try {
      await loadModels();
      await startWebcam();
      detectionInterval = setInterval(() => {
        if (detectionRunning) detectLoop().catch(e => console.error(e));
      }, 400);
    } catch (err) {
      console.error(err);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      detectionRunning = false;
    }
  });

  stopBtn.addEventListener('click', () => {
    detectionRunning = false;
    clearInterval(detectionInterval);
    detectionInterval = null;
    stopWebcam();
    stopSong();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    detectedEl.textContent = '—';
    confidenceEl.textContent = '';
    lastEmotion = null;
    smoothingWindow = [];
  });

  // play audio on Now Playing click if paused
  nowPlayingEl.addEventListener('click', () => {
    if (audio && audio.src && audio.paused) audio.play();
  });
  </script>
</body>
</html>
